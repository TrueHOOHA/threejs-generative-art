<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Art Grid - Three.js</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-overlay">
        <div class="controls">
            <h1>Generative Art Grid</h1>
            <p>Lygia Clark Inspired Interactive 3D Art</p>
            <div class="instructions">
                <p>🖱️ Drag to rotate camera</p>
                <p>🔍 Scroll to zoom</p>
                <p>🎨 Use controls to modify parameters</p>
            </div>
        </div>
        <div id="stats" class="stats">FPS: <span id="fps">60</span></div>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
